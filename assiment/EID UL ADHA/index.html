<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bakra Eid Countdown</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>🐐 Bakra Eid Countdown</h1>

    <div class="timer">
        <div class="box">
            <span id="days">0</span>
            Days
        </div>

        <div class="box">
            <span id="hours">0</span>
            Hours
        </div>

        <div class="box">
            <span id="minutes">0</span>
            Minutes
        </div>

        <div class="box">
            <span id="seconds">0</span>
            Seconds
        </div>
    </div>








    <script src="app.js"></script>
</body>

</html>
